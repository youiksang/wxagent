{% extends "base.html" %}

{% block title %}로그인{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">로그인</h2>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="username" class="form-label">사용자 이름</label>
                <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="username"
                    required
                    autofocus
                    placeholder="사용자 이름"
                >
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">비밀번호</label>
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    required
                    placeholder="비밀번호"
                >
            </div>
            <button type="submit" class="btn btn-primary-custom w-100">로그인</button>
        </form>
        <p class="auth-footer text-center mt-3 mb-0">
            계정이 없으신가요? <a href="{{ url_for('register') }}">회원가입</a>
        </p>
    </div>
</div>
{% endblock %}
